<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Producción</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: none; background: #334155; color: white; box-sizing: border-box;}
        button { width: 100%; padding: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; color: white; margin-bottom: 10px; transition: 0.2s;}
        button:active { transform: scale(0.95); }
        .btn-green { background: #22c55e; } .btn-red { background: #ef4444; } .btn-blue { background: #3b82f6; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .file-upload-box { background: rgba(59, 130, 246, 0.2); border: 1px dashed #3b82f6; padding: 15px; border-radius: 5px; text-align: center; margin-bottom: 15px;}
    </style>
</head>
<body>
    <h2 style="text-align: center;">🎛️ PANEL DE TRANSMISIÓN</h2>

    <div class="card">
        <h3>1. CONTROL GENERAL</h3>
        <button class="btn-blue" onclick="socket.emit('toggleScoreboard', true)">👁️ MOSTRAR MARCADOR</button>
        <button class="btn-red" onclick="socket.emit('toggleScoreboard', false)">🙈 OCULTAR MARCADOR</button>
        <label>Color Principal (Cintillo):</label>
        <input type="color" id="mainColor" value="#1a1a2e" style="height: 50px;">
    </div>

    <div class="grid-2">
        <div class="card">
            <h3>LOCAL</h3>
            <input type="text" id="homeName" value="RAC" placeholder="Siglas (Ej: RAC)">
            
            <div class="file-upload-box">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">Subir Escudo (PNG):</label>
                <input type="file" id="homeLogoFile" accept="image/png" style="background: transparent;">
            </div>

            <button class="btn-green" onclick="changeScore('home', 1)">⚽ +1 GOL</button>
            <button class="btn-red" onclick="changeScore('home', -1)">-1 GOL</button>
        </div>

        <div class="card">
            <h3>VISITANTE</h3>
            <input type="text" id="awayName" value="VIS" placeholder="Siglas (Ej: VIS)">
            
            <div class="file-upload-box">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">Subir Escudo (PNG):</label>
                <input type="file" id="awayLogoFile" accept="image/png" style="background: transparent;">
            </div>

            <button class="btn-green" onclick="changeScore('away', 1)">⚽ +1 GOL</button>
            <button class="btn-red" onclick="changeScore('away', -1)">-1 GOL</button>
        </div>
    </div>

    <button class="btn-blue" style="padding: 20px; font-size: 18px;" onclick="updateInfo()">💾 GUARDAR NOMBRES Y ESCUDOS</button>

    <div class="card" style="margin-top:20px;">
        <h3>🔄 CAMBIOS / SUSTITUCIONES</h3>
        <select id="subTeam">
            <option value="home">EQUIPO LOCAL</option>
            <option value="away">EQUIPO VISITANTE</option>
        </select>
        <div class="grid-2">
            <div><label>SALE ⬇</label><input type="text" id="outNum" placeholder="Nº"><input type="text" id="outName" placeholder="Nombre"></div>
            <div><label>ENTRA ⬆</label><input type="text" id="inNum" placeholder="Nº"><input type="text" id="inName" placeholder="Nombre"></div>
        </div>
        <button class="btn-blue" onclick="launchSub()">LANZAR GRÁFICO DE CAMBIO</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentState = { homeScore: 0, awayScore: 0, homeLogoBase64: '', awayLogoBase64: '' };

        socket.on('stateUpdate', s => currentState = s);

        function changeScore(team, amount) {
            if (team === 'home') currentState.homeScore = Math.max(0, currentState.homeScore + amount);
            if (team === 'away') currentState.awayScore = Math.max(0, currentState.awayScore + amount);
            socket.emit('updateScore', currentState);
        }

        // Magia para convertir el archivo a código inmediatamente
        document.getElementById('homeLogoFile').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) { currentState.homeLogoBase64 = event.target.result; };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('awayLogoFile').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) { currentState.awayLogoBase64 = event.target.result; };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        function updateInfo() {
            socket.emit('updateTeamInfo', {
                mainColor: document.getElementById('mainColor').value,
                homeName: document.getElementById('homeName').value,
                awayName: document.getElementById('awayName').value,
                homeLogo: currentState.homeLogoBase64 || 'default.png',
                awayLogo: currentState.awayLogoBase64 || 'default.png'
            });
            alert("¡Actualizado en pantalla!");
        }

        function launchSub() {
            socket.emit('triggerSubstitution', {
                team: document.getElementById('subTeam').value,
                outNumber: document.getElementById('outNum').value, outName: document.getElementById('outName').value.toUpperCase(),
                inNumber: document.getElementById('inNum').value, inName: document.getElementById('inName').value.toUpperCase()
            });
            document.getElementById('outNum').value=''; document.getElementById('outName').value='';
            document.getElementById('inNum').value=''; document.getElementById('inName').value='';
        }
    </script>
</body>
</html>
